name: scraper precios

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # necesario para que el bot pueda hacer push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4        # v4 usa Node.js 24, sin warnings

      - name: Setup Python
        uses: actions/setup-python@v5   # v5 usa Node.js 24, sin warnings
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Commit resultados
        run: |
          git config --global user.name "bot-precios"
          git config --global user.email "bot@github.com"
          git add precios.csv scraper.log
          git commit -m "actualizacion diaria precios $(date +'%Y-%m-%d')" || echo "sin cambios"
          git push
