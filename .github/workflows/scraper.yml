name: scraper precios

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      PYTHONIOENCODING: utf-8       # fix encoding en nombres con tildes/caracteres especiales
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scraper.py

      - name: Commit resultados
        run: |
          git config --global user.name "bot-precios"
          git config --global user.email "bot@github.com"
          git add precios.csv scraper.log
          git commit -m "actualizacion diaria precios $(date +'%Y-%m-%d')" || echo "sin cambios"
          git push
